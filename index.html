<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chord Diagram Multi-Select + Export</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: Arial, sans-serif; background: #f8f8f8; }
    #chart-container { position: fixed; inset: 0; width: 100vw; height: 100vh; background: white; }
    #chart { display: block; width: 100vw; height: 100vh; }
    #toggle-controls { position: absolute; top: 10px; left: 10px; z-index: 10; }
    #header-controls {
      position: absolute; top: 50px; left: 10px; background: #fff;
      padding: 10px; border: 1px solid #ccc; display: none; z-index: 10;
      max-width: min(95vw, 600px); max-height: 90vh; overflow-y: auto;
    }
    #status { margin-top: 6px; font-size: 12px; color: #333; }
    label { display: inline-block; margin-top: 4px; }
    select, input[type="number"] { margin-left: 6px; }
    button { margin-top: 8px; margin-right: 8px; }

    details.control-section {
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 8px;
      background: #fafafa;
    }
    details.control-section summary {
      cursor: pointer;
      font-weight: bold;
      user-select: none;
    }
    details.control-section > div {
      margin-top: 8px;
    }
    #info-popup {
      position: absolute;
      display: none;
      z-index: 20;
      max-width: min(360px, 90vw);
      max-height: 55vh;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.92);
      border: 1px solid #555;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.35;
      color: #fff;
    }
    #info-popup h2 { margin: 0 22px 8px 0; font-size: 15px; }
    #info-popup .close-popup {
      position: absolute;
      top: 6px;
      right: 8px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      margin: 0;
    }
    #info-popup .detail { margin: 6px 0; }
    #info-popup .detail strong, #info-popup li strong { display: block; color: #bdbdbd; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    #info-popup ul { margin: 6px 0 0 18px; padding: 0; }
    #info-popup li { margin-bottom: 5px; }
  </style>
</head>
<body>
  <button id="toggle-controls">☰ Controls</button>
  <div id="header-controls">
    <h1 style="margin:0 0 8px 0;">Controls</h1>
    <input type="file" id="csv-file" accept=".csv">
    <div id="status">Loading embedded CSV...</div>
    <br/>
    <label>People Colors:
      <select id="people-colors">
        <option value="purple-lightblue">Purple → Light Blue</option>
        <option value="orange-yellow">Orange → Yellow</option>
        <option value="blue-green">Blue → Green</option>
      </select>
    </label>
    <br/>
    <label>Answer Colors:
      <select id="answer-colors">
        <option value="dark">Darker variant</option>
        <option value="pastel">Pastel</option>
        <option value="contrast">High contrast</option>
      </select>
    </label>
    <br/>
    <label>Ribbon Offset:
      <input type="number" id="ribbon-offset" value="20" min="0" max="200"> px
    </label>
    <br/>
    <label>Ribbon Stroke Width:
      <input type="number" id="ribbon-width" value="1.5" min="0.5" max="10" step="0.5"> px
    </label>
    <br/>
    <details class="control-section">
      <summary>Show/Hide People</summary>
      <div id="people-checkboxes"></div>
    </details>
    <br/>
    <button id="apply-style">Apply</button>
    <button id="clear-selection">Clear Selection</button>
    <details class="control-section">
      <summary>Selections</summary>
      <div id="selection-list">No selections yet.</div>
    </details>
    <button id="reset-zoom">Reset Pan / Zoom</button>
    <br/><br/>
    <button id="export-svg">Export SVG</button>
    <button id="export-png">Save as PNG</button>
  </div>

  <div id="info-popup" role="dialog" aria-live="polite">
    <button class="close-popup" type="button" aria-label="Close popup">×</button>
    <div id="popup-content"></div>
  </div>

  <div id="chart-container">
    <svg id="chart"></svg>
  </div>

    let width = window.innerWidth;
    let height = window.innerHeight;
    const svg = d3.select("#chart").attr("width", width).attr("height", height);
    const zoomLayer = svg.append("g");
    const container = zoomLayer.append("g");

    const zoomBehavior = d3.zoom()
      .scaleExtent([0.2, 8])
      .filter(event => !event.target.closest || !event.target.closest("#header-controls, #toggle-controls"))
      .on("zoom", event => {
        zoomLayer.attr("transform", event.transform);
      });

    svg.call(zoomBehavior);
    svg.on("dblclick.zoom", null);

    function resetPanZoom() {
      svg.interrupt();
      svg.call(zoomBehavior.transform, d3.zoomIdentity);
    }

    document.getElementById("reset-zoom").addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      resetPanZoom();
    });

    let peopleColorScheme = "purple-lightblue";
    let answerColorScheme = "dark";
    let ribbonOffset = 20;
    let ribbonStrokeWidth = 1.5;
    let lastData = null;
    let hiddenPeople = new Set();
    let selectedElements = new Set();
    let currentConnectionDetails = {};
    let currentDetailsByGroup = {};

    const popup = document.getElementById("info-popup");
    const popupContent = document.getElementById("popup-content");
    popup.querySelector(".close-popup").addEventListener("click", () => hidePopup());
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") hidePopup();
    });

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function positionPopup(event) {
      const padding = 12;
      const popupWidth = popup.offsetWidth || 360;
      const popupHeight = popup.offsetHeight || 220;
      let left = event.clientX + padding;
      let top = event.clientY + padding;
      if (left + popupWidth > window.innerWidth - padding) left = event.clientX - popupWidth - padding;
      if (top + popupHeight > window.innerHeight - padding) top = event.clientY - popupHeight - padding;
      popup.style.left = Math.max(padding, left) + "px";
      popup.style.top = Math.max(padding, top) + "px";
    }

    function showPopup(event, html) {
      popupContent.innerHTML = html;
      popup.style.display = "block";
      positionPopup(event);
    }

    function hidePopup() {
      popup.style.display = "none";
    }

    function ribbonDetailKey(ribbonData) {
      const source = ribbonData.source.index;
      const target = ribbonData.target.index;
      return `${Math.min(source, target)}|${Math.max(source, target)}`;
    }

    document.getElementById("toggle-controls").addEventListener("click", () => {
      const panel = document.getElementById("header-controls");
      panel.style.display = (panel.style.display === "block") ? "none" : "block";
    });

    document.getElementById("apply-style").addEventListener("click", () => {
      peopleColorScheme = document.getElementById("people-colors").value;
      answerColorScheme = document.getElementById("answer-colors").value;
      ribbonOffset = +document.getElementById("ribbon-offset").value;
      ribbonStrokeWidth = +document.getElementById("ribbon-width").value;
      if (lastData) processData(lastData);
    });

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    function loadCsvText(csvText) {
      try {
        const csvData = d3.csvParse(csvText);
        lastData = csvData;
        hiddenPeople.clear();
        buildPeopleCheckboxes(csvData.columns.slice(1));
        processData(csvData);
      } catch (err) {
        console.error(err);
        setStatus("Parse error");
      }
    }

    document.getElementById("csv-file").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      setStatus("Loading...");
      const reader = new FileReader();
      reader.onload = function(e) {
        loadCsvText(e.target.result);
      };
      reader.readAsText(file);
    });

    function buildPeopleCheckboxes(people) {
      const containerDiv = document.getElementById("people-checkboxes");
      containerDiv.innerHTML = "<strong>Show/Hide People:</strong><br/>";
      people.forEach(person => {
        const label = document.createElement("label");
        label.style.display = "block";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !hiddenPeople.has(person);
        cb.value = person;
        cb.addEventListener("change", () => {
          if (cb.checked) hiddenPeople.delete(person);
          else hiddenPeople.add(person);
          if (lastData) processData(lastData);
        });
        label.appendChild(cb);
        label.appendChild(document.createTextNode(" " + person));
        containerDiv.appendChild(label);
      });
    }

    // Export SVG
    document.getElementById("export-svg").addEventListener("click", () => {
      const serializer = new XMLSerializer();
      let source = serializer.serializeToString(svg.node());
      if (!source.match(/^<svg[^>]+xmlns="http:\/\/www.w3.org\/2000\/svg"/)) {
        source = source.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
      }
      if (!source.match(/^<svg[^>]+"http:\/\/www.w3.org\/1999\/xlink"/)) {
        source = source.replace(/^<svg/, '<svg xmlns:xlink="http://www.w3.org/1999/xlink"');
      }
      const blob = new Blob([`<?xml version="1.0" standalone="no"?>\n${source}`], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "chord-diagram.svg";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    });

    // Export PNG
    document.getElementById("export-png").addEventListener("click", () => {
      const serializer = new XMLSerializer();
      const source = serializer.serializeToString(svg.node());
      const svgBlob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);

      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "white"; // white background
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, width, height);
        URL.revokeObjectURL(url);

        const pngUrl = canvas.toDataURL("image/png");
        const link = document.createElement("a");
        link.download = "chord-diagram.png";
        link.href = pngUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };
      img.src = url;
    });

    const palettes = {
      people: {
        "purple-lightblue": d3.interpolateRgb("#6a1b9a", "#6baed6"),
        "orange-yellow": d3.interpolateRgb("#e6550d", "#ffd92f"),
        "blue-green": d3.interpolateRgb("#08519c", "#31a354")

      answers: {

    document.getElementById("clear-selection").addEventListener("click", () => {
      selectedElements.clear();
      hidePopup();
      if (currentRibbons && currentGroupPaths && currentGroupTexts) {
        currentRibbons.style("opacity", 0.7);

      }

    let currentRibbons = null;
    let currentGroupPaths = null;
    let currentGroupTexts = null;
    let resizeTimer = null;

    function resizeChart() {
      width = window.innerWidth;
      height = window.innerHeight;
      svg.attr("width", width).attr("height", height);
      resetPanZoom();
      if (lastData) processData(lastData);
    }

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeChart, 120);
    });


    function updateSelectionList() {
      const list = document.getElementById("selection-list");
      if (!list) return;

      if (!selectedElements || selectedElements.size === 0) {
        list.innerHTML = "No selections yet.";
        return;
      }

      const items = [];
      selectedElements.forEach(sel => {
        if (sel.source && sel.target) {
          const personIndex = sel.source.index < peopleGlobal.length ? sel.source.index : sel.target.index;
          const answerIndex = sel.source.index >= peopleGlobal.length ? sel.source.index : sel.target.index;
          const person = peopleGlobal[personIndex] || "Unknown person";
          const answer = answersGlobal[answerIndex - peopleGlobal.length] || "Unknown answer";
          items.push(`<div style="margin-bottom:6px;"><strong>${escapeHtml(person)}</strong><br/>${escapeHtml(answer)}</div>`);
        } else if (sel.index !== undefined) {
          if (sel.index < peopleGlobal.length) {
            items.push(`<div style="margin-bottom:6px;"><strong>Person:</strong> ${escapeHtml(peopleGlobal[sel.index])}</div>`);
          } else {
            items.push(`<div style="margin-bottom:6px;"><strong>Answer:</strong> ${escapeHtml(answersGlobal[sel.index - peopleGlobal.length])}</div>`);
          }
        }
      });

      list.innerHTML = items.join("");
    }

    let peopleGlobal = [];
    let answersGlobal = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function processData(rawData) {
      container.selectAll("*").remove();
      selectedElements.clear();
      hidePopup();
      currentConnectionDetails = {};
      currentDetailsByGroup = {};

      const people = rawData.columns.slice(1);
      const answers = [];
      const answerIndexMap = {};
      const answerMeta = [];

      rawData.forEach(row => {
        const question = row[rawData.columns[0]];
        people.forEach(person => {
          const answer = row[person];
          if (answer && answer.trim() !== "") {
            const parts = answer.split(/[:;]+/);
            parts.forEach(part => {
              const clean = part.trim();
              if (clean !== "") {
                const key = `${question}:${clean.toLowerCase()}`;
                if (answerIndexMap[key] === undefined) {
                  answerIndexMap[key] = answers.length;
                  answers.push(`${question}: ${clean}`);
                  answerMeta.push({ question, answer: clean });
                }
              }
            });
          }
        });
      });

      const connections = [];
      rawData.forEach(row => {
        const question = row[rawData.columns[0]];
        people.forEach((person, i) => {
          if (hiddenPeople.has(person)) return;
          const answer = row[person];
          if (answer && answer.trim() !== "") {
            const parts = answer.split(/[:;]+/);
            parts.forEach(part => {
              const clean = part.trim();
              if (clean !== "") {
                const key = `${question}:${clean.toLowerCase()}`;
                const answerIdx = answerIndexMap[key];
                if (answerIdx !== undefined) {
                  connections.push({ personIndex: i, answerIndex: answerIdx, person, question, answer: clean });
                }
              }
            });
          }
        });
      });

      const matrixSize = people.length + answers.length;
      const matrix = Array(matrixSize).fill().map(() => Array(matrixSize).fill(0));
      connections.forEach(({ personIndex, answerIndex, person, question, answer }) => {
        const ai = people.length + answerIndex;
        matrix[personIndex][ai] += 1;
        matrix[ai][personIndex] += 1;

        const key = `${Math.min(personIndex, ai)}|${Math.max(personIndex, ai)}`;
        if (!currentConnectionDetails[key]) currentConnectionDetails[key] = [];
        currentConnectionDetails[key].push({ person, question, answer });

        if (!currentDetailsByGroup[personIndex]) currentDetailsByGroup[personIndex] = [];
        currentDetailsByGroup[personIndex].push({ person, question, answer });

        if (!currentDetailsByGroup[ai]) currentDetailsByGroup[ai] = [];
        currentDetailsByGroup[ai].push({ person, question, answer });
      });

      drawChordDynamic(people, answers, answerMeta, matrix);
      setStatus(`Rendering ${people.length} people × ${answers.length} answers`);
    }

    function drawChordDynamic(people, answers, answerMeta, matrix) {
      const outerRadius = Math.max(80, Math.min(width, height) / 2 - 100);
      const innerRadius = Math.max(50, outerRadius - 15);

      const chord = d3.chord().padAngle(0.02).sortSubgroups(d3.descending);
      const chords = chord(matrix);

      const arc = d3.arc().innerRadius(innerRadius).outerRadius(outerRadius);
      const ribbon = d3.ribbon().radius(innerRadius - ribbonOffset);

      const peopleColor = (i) => palettes.people[peopleColorScheme](i / Math.max(1, people.length - 1));
      const answerColor = (i) => palettes.answers[answerColorScheme](i / Math.max(1, answers.length - 1));
      const color = (i) => (i < people.length ? peopleColor(i) : answerColor(i - people.length));

      function formatRibbonPopup(d) {
        const details = currentConnectionDetails[ribbonDetailKey(d)] || [];
        if (!details.length) return "<h2>No detail found</h2>";
        const first = details[0];
        const items = details.map(detail => `
          <li>
            <div><strong>Question</strong> ${escapeHtml(detail.question)}</div>
            <div><strong>Answer</strong> ${escapeHtml(detail.answer)}</div>
          </li>
        `).join("");
        return `
          <h2>${escapeHtml(first.person)}</h2>
          <div class="detail"><strong>Selected connection</strong></div>
          <ul>${items}</ul>
        `;
      }

      function formatGroupPopup(g) {
        const details = currentDetailsByGroup[g.index] || [];
        if (g.index < people.length) {
          const person = people[g.index];
          if (!details.length) return `<h2>${escapeHtml(person)}</h2><div class="detail">No visible answers.</div>`;
          const items = details.slice(0, 80).map(detail => `
            <li>
              <div><strong>Question</strong> ${escapeHtml(detail.question)}</div>
              <div><strong>Answer</strong> ${escapeHtml(detail.answer)}</div>
            </li>
          `).join("");
          const more = details.length > 80 ? `<div class="detail">Showing first 80 of ${details.length} answers.</div>` : "";
          return `<h2>${escapeHtml(person)}</h2><div class="detail"><strong>All visible answers for this person</strong></div><ul>${items}</ul>${more}`;
        }

        const meta = answerMeta[g.index - people.length];
        const peopleList = [...new Set(details.map(detail => detail.person))].sort();
        const items = peopleList.slice(0, 120).map(person => `<li>${escapeHtml(person)}</li>`).join("");
        const more = peopleList.length > 120 ? `<div class="detail">Showing first 120 of ${peopleList.length} people.</div>` : "";
        return `
          <h2>${escapeHtml(meta ? meta.answer : answers[g.index - people.length])}</h2>
          <div class="detail"><strong>Question</strong> ${escapeHtml(meta ? meta.question : "")}</div>
          <div class="detail"><strong>People with this answer</strong></div>
          <ul>${items || "<li>No visible people.</li>"}</ul>${more}
        `;
      }

      const group = container.append("g").selectAll("g").data(chords.groups).join("g");
      const groupPaths = group.append("path")
        .attr("d", arc)
        .attr("fill", d => (d.index < people.length && hiddenPeople.has(people[d.index])) ? "transparent" : color(d.index));

      const groupTexts = group.append("text")
        .attr("dy", ".35em")
        .attr("transform", d => {
          const angle = (d.startAngle + d.endAngle) / 2;
          return `rotate(${angle * 180 / Math.PI - 90}) translate(${outerRadius + 20}) ${angle > Math.PI ? "rotate(180)" : ""}`;
        })
        .attr("text-anchor", d => ((d.startAngle + d.endAngle) / 2 > Math.PI) ? "end" : "start")
        .text(d => {
          if (d.index < people.length && hiddenPeople.has(people[d.index])) return "";
          if (d.index < people.length) return people[d.index];
          const label = answers[d.index - people.length];
          const short = (label.split(":")[1] || label).trim();
          return short.length > 25 ? short.slice(0, 25) + "…" : short;
        })
        .style("font-size", (people.length + answers.length > 300) ? "7px" : "9px");

      const ribbons = container.append("g").selectAll("path").data(chords).join("path")
        .attr("d", ribbon)
        .attr("fill", "none")
        .attr("stroke", d => color(d.source.index))
        .attr("stroke-width", ribbonStrokeWidth)
        .style("opacity", 0.7);

      currentRibbons = ribbons;
      currentGroupPaths = groupPaths;
      currentGroupTexts = groupTexts;

      function updateHighlights() {
        updateSelectionList();
        if (selectedElements.size === 0) {
          ribbons.style("opacity", 0.7);
          groupPaths.style("opacity", 1);
          groupTexts.style("opacity", 1);
          return;
        }

        ribbons.style("opacity", r => {
          if (selectedElements.has(r)) return 1;
          for (let sel of selectedElements) {
            if (sel.index !== undefined) {
              if (r.source.index === sel.index || r.target.index === sel.index) return 1;
            }
          }
          return 0.05;
        });

        groupPaths.style("opacity", g => {
          if (selectedElements.has(g)) return 1;
          for (let sel of selectedElements) {
            if (sel.source) {
              if (sel.source.index === g.index || sel.target.index === g.index) return 1;
            }
            if (sel.index !== undefined && sel.index === g.index) return 1;
          }
          return 0.2;
        });
        groupTexts.style("opacity", g => {
          if (selectedElements.has(g)) return 1;
          for (let sel of selectedElements) {
            if (sel.source) {
              if (sel.source.index === g.index || sel.target.index === g.index) return 1;
            }
            if (sel.index !== undefined && sel.index === g.index) return 1;
          }
          return 0.2;
        });
      }

      ribbons.on("click", function(event, clicked) {
        event.stopPropagation();
        if (selectedElements.has(clicked)) selectedElements.delete(clicked);
        else selectedElements.add(clicked);
        updateHighlights();
        showPopup(event, formatRibbonPopup(clicked));
      });

      group.on("click", function(event, clickedGroup) {
        event.stopPropagation();
        if (selectedElements.has(clickedGroup)) selectedElements.delete(clickedGroup);
        else selectedElements.add(clickedGroup);
        updateHighlights();
        showPopup(event, formatGroupPopup(clickedGroup));
      });

      ribbons.on("mouseover", function(event, d) {
        if (selectedElements.size === 0) {
          ribbons.style("opacity", o => (o === d ? 1 : 0.05));
          groupPaths.style("opacity", g =>
            g.index === d.source.index || g.index === d.target.index ? 1 : 0.2
          );
          groupTexts.style("opacity", g =>
            g.index === d.source.index || g.index === d.target.index ? 1 : 0.2
          );
        }
      }).on("mouseout", function() {
        if (selectedElements.size === 0) {
          ribbons.style("opacity", 0.7);
          groupPaths.style("opacity", 1);
          groupTexts.style("opacity", 1);
        }
      });

      const bbox = container.node().getBBox();
      const scale = Math.min(width / Math.max(1, bbox.width), height / Math.max(1, bbox.height)) * 0.9;
      container.attr("transform",
        `translate(${width/2 - (bbox.x + bbox.width/2) * scale},${height/2 - (bbox.y + bbox.height/2) * scale}) scale(${scale})`
      );
    }

    // Load the embedded CSV immediately when the page opens.
    loadCsvText(embeddedCsv);
  
      // Reset diagram when clicking empty background
      svg.on("click", function(event) {
        const target = event.target;

        // Ignore clicks on ribbons, arcs, labels, controls
        if (
          target.tagName === "path" ||
          target.tagName === "text" ||
          target.closest("#header-controls") ||
          target.closest("#toggle-controls")
        ) {
          return;
        }

        selectedElements.clear();
        updateSelectionList();
        resetPanZoom();

        if (currentRibbons && currentGroupPaths && currentGroupTexts) {
          currentRibbons.style("opacity", 0.7);
          currentGroupPaths.style("opacity", 1);
          currentGroupTexts.style("opacity", 1);
        }

        hidePopup();
      });

</script>
</body>
</html>
